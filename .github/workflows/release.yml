name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (leave empty for auto-detect from commits)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Version, Tag & Publish
    runs-on: ubuntu-latest
    # Skip if the push was from the release bot itself
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore(release)')"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Compile
        run: pnpm run compile

      - name: Compile Tests
        run: pnpm run test-compile

      - name: Copy Test Runner
        run: |
          mkdir -p out/test
          cp src/test/runTest.js out/test/

      - name: Run Tests
        uses: GabrielBB/xvfb-action@v1
        with:
          run: pnpm run test
          working-directory: ${{ github.workspace }}

      - name: Determine Version Bump
        id: bump
        run: |
          if [ -n "${{ github.event.inputs.bump }}" ]; then
            echo "type=${{ github.event.inputs.bump }}" >> $GITHUB_OUTPUT
            echo "Manual bump: ${{ github.event.inputs.bump }}"
            exit 0
          fi

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log $RANGE --pretty=format:"%s" 2>/dev/null || echo "")

          if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
            echo "type=major" >> $GITHUB_OUTPUT
            echo "Detected: major (breaking change)"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
            echo "Detected: minor (new feature)"
          elif echo "$COMMITS" | grep -qiE "^(fix|perf|refactor)(\(.+\))?:"; then
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "Detected: patch (fix/perf/refactor)"
          else
            echo "type=none" >> $GITHUB_OUTPUT
            echo "No version-worthy commits found, skipping release"
          fi

      - name: Bump Version
        if: steps.bump.outputs.type != 'none'
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping $CURRENT -> $NEW_VERSION"

          # Update package.json version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Package VSIX
        if: steps.bump.outputs.type != 'none'
        run: pnpm dlx vsce package --no-dependencies

      - name: Get VSIX file name
        if: steps.bump.outputs.type != 'none'
        id: vsix
        run: echo "name=$(ls *.vsix)" >> $GITHUB_OUTPUT

      - name: Commit Version Bump
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Publish to VS Code Marketplace
        if: steps.bump.outputs.type != 'none'
        run: pnpm dlx vsce publish --packagePath ${{ steps.vsix.outputs.name }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        if: steps.bump.outputs.type != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          files: ${{ steps.vsix.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
